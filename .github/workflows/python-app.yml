name: Python CI

on:
  push:
    paths:
      - "pipes/openai_responses.py"
      - "tests/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "pipes/openai_responses.py"
      - "tests/**"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx fastapi starlette pydantic

      - name: Run tests
        run: pytest -q
